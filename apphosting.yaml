# Firebase App Hosting — FeedSomeone production config.
# Secrets are Cloud Secret Manager refs (firebase apphosting:secrets:set NAME).
# Stripe block is added when real keys arrive (Day 2); until then PAYMENT_PROVIDER=mock.

runConfig:
  cpu: 1
  memoryMiB: 2048
  minInstances: 0
  maxInstances: 4
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://feedsomeone--feedsomeone-786.us-central1.hosted.app # → feedsomeone.org once the domain is added
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_SUPABASE_URL
    value: https://htcmvczrrabikzvaatfo.supabase.co
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
    value: sb_publishable_GNOXes8ZmF24BD5PaO0zHQ_4zSQnE-0
    availability: [BUILD, RUNTIME]

  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: SUPABASE_SERVICE_ROLE_KEY
    availability: [RUNTIME]

  - variable: PAYMENT_PROVIDER
    value: mock # flip to `stripe` once stripe-init.sh has run + secrets are set
    availability: [RUNTIME]

  - variable: MOCK_WEBHOOK_SECRET
    secret: MOCK_WEBHOOK_SECRET
    availability: [RUNTIME]

  - variable: EMAIL_PROVIDER
    value: resend
    availability: [RUNTIME]

  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability: [RUNTIME]

  - variable: EMAIL_FROM
    value: FeedSomeone <onboarding@resend.dev> # → photos@feedsomeone.org once the domain is verified
    availability: [RUNTIME]

  - variable: CRON_SECRET
    secret: APP_CRON_SECRET # same secret the scheduled functions read
    availability: [RUNTIME]

  - variable: GEO_FALLBACK_CURRENCY
    value: USD
    availability: [RUNTIME]

  - variable: STATS_MIN_MEALS
    value: "500"
    availability: [RUNTIME]

  - variable: STATS_MIN_DONORS
    value: "100"
    availability: [RUNTIME]
