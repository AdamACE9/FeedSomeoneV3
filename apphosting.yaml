# Firebase App Hosting — FeedSomeone production config
# Secrets are Cloud Secret Manager refs: scripts/firebase-init.sh creates them
# (firebase apphosting:secrets:set NAME). Plain values are safe-to-expose only.

runConfig:
  cpu: 1
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 4
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://feedsomeone.org
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_SUPABASE_URL
    value: https://YOUR-PROJECT-REF.supabase.co # ← supabase-init.sh prints this
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
    value: YOUR-ANON-KEY # anon key is public by design
    availability: [BUILD, RUNTIME]

  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: SUPABASE_SERVICE_ROLE_KEY
    availability: [RUNTIME]

  - variable: PAYMENT_PROVIDER
    value: mock # ← flip to `stripe` on Day 2; nothing else changes
    availability: [RUNTIME]

  - variable: MOCK_WEBHOOK_SECRET
    secret: MOCK_WEBHOOK_SECRET
    availability: [RUNTIME]

  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability: [RUNTIME]

  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    value: pk_live_or_test_HERE
    availability: [BUILD, RUNTIME]

  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability: [RUNTIME]

  - variable: EMAIL_PROVIDER
    value: resend
    availability: [RUNTIME]

  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability: [RUNTIME]

  - variable: EMAIL_FROM
    value: FeedSomeone <photos@feedsomeone.org>
    availability: [RUNTIME]

  - variable: CRON_SECRET
    secret: APP_CRON_SECRET # same secret the scheduled functions read
    availability: [RUNTIME]

  - variable: GEO_FALLBACK_CURRENCY
    value: USD
    availability: [RUNTIME]

  - variable: STATS_MIN_MEALS
    value: "500"
    availability: [RUNTIME]

  - variable: STATS_MIN_DONORS
    value: "100"
    availability: [RUNTIME]
